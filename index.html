<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* PAPER TEXTURE */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}
@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* FLOATING */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* CINEMATIC TRANSITION */
.section{
    display:none;
    padding:40px;
    text-align:center;
    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition:1s cubic-bezier(0.22,1,0.36,1);
}

.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

.section.exit{
    transform:scale(0.92);
    opacity:0;
    filter:blur(12px);
}

/* BOX */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    max-width:800px;
    margin:auto;
}

/* SONG BORDER FIX (RESTORED) */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:15px;
    margin:15px auto;
    width:260px;
    background:rgba(40,10,10,0.6);
}

/* BUTTONS */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
}
button:hover{background:#a83232;}

/* POEM */
#poem{
    white-space:pre-line;
    text-align:left;
    font-size:22px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- QUESTIONS 1 -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>
<button onclick="start()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- SONGS -->
<div class="section" id="songs">
<div class="box">
<h2>songs that remind me of you</h2>
<div id="songBox"></div>
<button onclick="nextSong()">next</button>
</div>
</div>

<!-- POEM PARTS -->
<div class="section" id="p1">
<div class="box">
<div id="t1"></div>
<h3>are you still with me?</h3>
<button onclick="goP2()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<div class="section" id="p2">
<div class="box">
<div id="t2"></div>
<h3>do you still wanna read? its so long😭</h3>
<button onclick="goP3()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<div class="section" id="p3">
<div class="box">
<div id="t3"></div>
<h3>last question... how are you feeling?</h3>
<button onclick="final()">confused</button>
<button onclick="final()">happy</button>
<button onclick="final()">angry</button>
<button onclick="final()">disgusted</button>
</div>
</div>

<!-- FINAL -->
<div class="section" id="final">
<div class="box">
<h2 id="finalText"></h2>
</div>
</div>

<script>

let current="q1";

function go(id){
let prev=document.getElementById(current);
prev.classList.add("exit");

setTimeout(()=>{
prev.classList.remove("active","exit");
document.getElementById(id).classList.add("active");
current=id;
},700);
}

function start(){
go("songs");
}

/* SONGS (BORDER FIXED) */
const songs=[
"ALEXANDRA — Reality Club",
"SECRET DOOR — Arctic Monkeys",
"1&ONLY — XLOV"
];
let i=0;

function nextSong(){
if(i<songs.length){
let d=document.createElement("div");
d.className="song";
d.innerText=songs[i];
document.getElementById("songBox").appendChild(d);
i++;
} else {
document.querySelector("#songs button").onclick=type1;
}
}

/* FULL POEM (UNCHANGED BUT CORRECT FORMAT) */
const p1=`I need to tell you something
not to change anything
just because I’m tired of pretending
I told you I moved on
I didn’t
it’s been eleven months (or more because I wrote this at Apr 28 2026)
of carrying this quietly
of smiling like it faded
when it never did
I remember when I told you before
and you said you couldn’t
not because there was nothing
but because you were closed
because you thought it wouldn’t end well
and I understood that
I still do
but understanding it
didn’t make my feelings disappear
so I stayed
as your friend
your best friend (I hope 🫣)`;

const p2=`and somewhere along the way
I learned how to hide it
how to make it look like I was okay
but I wasn’t
I’m still here
still feeling it
still hoping in ways I don’t say out loud
and I hate that I lied to you about that
because everything I do for you
every little thing
it all comes from something
I never really let go of`;

const p3=`and I don’t think you realize
what you do to me
how something as simple as your name
lighting up my phone
can change my whole mood
how I still get excited
over the smallest message from you
how I hear your voice in class
and everything else fades
just for a second
how I look for you
in every crowded place
and somehow
you’re always the one I find first

how I make up little scenarios
of us in my head
like holding your hand
like being something more
how every calm moment
every beautiful place
makes me wish
you were there with me
how every love song
sounds like it was written
with you in mind

and it’s exhausting
to feel this much
and act like it’s nothing
to hope
even when I tell myself
I shouldn’t

so if nothing ever changes
I’ll stay
I’ll still be here
as your friend....
though i want you to think about it for a second time`;

/* TYPEWRITER (SLOW + PAUSE FRIENDSHIP....) */
function type(el,text,speed=30,cb){
let i=0;
el.innerHTML="";

function t(){
if(i<text.length){

el.innerHTML += text[i] === "\n" ? "<br>" : text[i];

/* 2 second pause */
if(text.substring(i-11,i)==="friendship"){
setTimeout(t,2000);
return;
}

i++;
setTimeout(t,speed);
} else cb && cb();
}
t();
}

/* FLOW */
function type1(){
go("p1");
type(document.getElementById("t1"),p1);
}
function goP2(){
go("p2");
type(document.getElementById("t2"),p2);
}
function goP3(){
go("p3");
type(document.getElementById("t3"),p3);
}
function final(){
go("final");
type(document.getElementById("finalText"),
"thank you...");
}

function closeSite(){
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:20%'>closed.</h1>";
}

</script>

</body>
</html>
