<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* paper texture */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}
@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* floating */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* sections cinematic */
.section{
    display:none;
    padding:40px;
    text-align:center;
    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition:1s cubic-bezier(0.22,1,0.36,1);
}
.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

/* box */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    max-width:800px;
    margin:auto;
}

/* song glow */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:15px;
    margin:15px auto;
    width:260px;
    background:rgba(40,10,10,0.6);
    animation:songGlow 1s ease;
}
@keyframes songGlow{
    from{box-shadow:0 0 0 rgba(255,100,100,0);}
    to{box-shadow:0 0 20px rgba(255,100,100,0.4);}
}

/* button glow */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
    position:relative;
    overflow:hidden;
}
button:active::after{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(255,255,255,0.4),transparent);
    transform:translate(-50%,-50%);
    animation:flash 0.4s ease;
}
@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

/* final blinking ? */
.blink{
    animation:blink 1s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- Q1 -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- Q2 -->
<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- Q3 -->
<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>
<h2 id="before" class="blink">but before that</h2>
<button onclick="start()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- SONGS -->
<div class="section" id="songs">
<div class="box">
<h2>songs that remind me of you</h2>
<div id="songBox"></div>
<button onclick="nextSong()">next</button>
</div>
</div>

<!-- POEM INTRO -->
<div class="section" id="intro">
<div class="box">
<h2 id="introText"></h2>
</div>
</div>

<!-- POEM 1 -->
<div class="section" id="p1">
<div class="box">
<div id="t1"></div>
<h3>are you still with me?</h3>
<button onclick="goP2()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- POEM 2 -->
<div class="section" id="p2">
<div class="box">
<div id="t2"></div>
<h3>are you still with me?</h3>
<button onclick="goP3()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- POEM 3 -->
<div class="section" id="p3">
<div class="box">
<div id="t3"></div>
</div>
</div>

<!-- FINAL -->
<div class="section" id="final">
<div class="box">
<h2 id="finalText"></h2>
</div>
</div>

<script>

let current="q1";

function go(id){
document.getElementById(current).classList.remove("active");
setTimeout(()=>{
document.getElementById(id).classList.add("active");
current=id;
},400);
}

function start(){
go("songs");
}

/* SONGS */
const songs=[
"ALEXANDRA — Reality Club",
"SECRET DOOR — Arctic Monkeys",
"1&ONLY — XLOV"
];
let i=0;

function nextSong(){
if(i<songs.length){
let d=document.createElement("div");
d.className="song";
d.innerText=songs[i];
document.getElementById("songBox").appendChild(d);
i++;
} else {
go("intro");
typeIntro();
}
}

/* INTRO */
function typeIntro(){
let el=document.getElementById("introText");
let text="okay here goes...";
let i=0;
el.innerHTML="";

function t(){
if(i<text.length){
el.innerHTML+=text[i];
i++;
setTimeout(t,70);
} else {
setTimeout(()=>go("p1"),800);
setTimeout(type1,1200);
}
}
t();
}

/* FULL POEM SPLIT */

const p1=`I need to tell you something
not to change anything
just because I’m tired of pretending
I told you I moved on
I didn’t
it’s been eleven months (or more because I wrote this at Apr 28 2026)
of carrying this quietly
of smiling like it faded
when it never did
I stayed
as your friend
your best friend (I hope 🫣)`;

const p2=`and somewhere along the way
I learned how to hide it
how to make it look like I was okay
but I wasn’t
I’m still here
still feeling it
still hoping in ways I don’t say out loud
and I hate that I lied to you about that

and I don’t think you realize
what you do to me
how your name changes everything
how I still get excited
over your messages
how I look for you everywhere`;

const p3=`how I make up scenarios of us
how every calm moment
feels like it’s missing you
how every love song
sounds like it was written for you

and it’s exhausting
to feel this much

so if nothing ever changes
I’ll stay
I’ll still be here
as your friend....
though i want you to think about it for a second time`;

/* TYPE */
function type(el,text,speed,cb){
let i=0;
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i]==="\n"?"<br>":text[i];
i++;
setTimeout(t,speed);
} else cb&&cb();
}
t();
}

function type1(){
type(document.getElementById("t1"),p1,28);
}
function goP2(){
go("p2");
type(document.getElementById("t2"),p2,28);
}
function goP3(){
go("p3");
type(document.getElementById("t3"),p3,28,final);
}

/* FINAL */
function final(){
go("final");
type(document.getElementById("finalText"),
"thank you for your time?",40);

setInterval(()=>{
let el=document.getElementById("finalText");
if(el.innerHTML.includes("?")){
el.innerHTML="thank you for your time";
} else {
el.innerHTML="thank you for your time?";
}
},1000);
}

function closeSite(){
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:20%'>closed.</h1>";
}

</script>

</body>
</html>
