<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* paper texture */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}
@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* float */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* cinematic sections */
.section{
    display:none;
    padding:40px;
    text-align:center;
    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition:1s cubic-bezier(0.22,1,0.36,1);
}
.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

/* box */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    max-width:800px;
    margin:auto;
}

/* SONG GLOW */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:15px;
    margin:15px auto;
    width:260px;
    background:rgba(40,10,10,0.6);
    animation:songGlow 1s ease;
}
@keyframes songGlow{
    from{box-shadow:0 0 0 rgba(255,100,100,0);}
    to{box-shadow:0 0 20px rgba(255,100,100,0.4);}
}

/* buttons */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
    position:relative;
    transition:0.3s;
}

/* 💡 click flash */
button:active::after{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(255,255,255,0.4),transparent);
    transform:translate(-50%,-50%);
    animation:flash 0.4s ease;
}
@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

/* 🚨 RUNNING NO BUTTON */
.no-run{
    position:relative;
    transition:0.2s;
}
.no-run.legs{
    animation:run 0.6s infinite;
}
@keyframes run{
    0%{transform:translateX(0) rotate(0deg);}
    25%{transform:translateX(20px) rotate(10deg);}
    50%{transform:translateX(-20px) rotate(-10deg);}
    100%{transform:translateX(0) rotate(0deg);}
}

/* blinking ? faster */
.blink{
    animation:blink 0.5s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- Q1 -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- Q2 -->
<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- Q3 -->
<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>
<h2 id="before" class="blink">but before that</h2>
<button onclick="start()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- POEM 1 -->
<div class="section" id="p1">
<div class="box">
<div id="t1"></div>
<h3>are you still with me?</h3>
<button onclick="goP2()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- POEM 2 -->
<div class="section" id="p2">
<div class="box">
<div id="t2"></div>
<h3>are you still with me?</h3>
<button onclick="goP3()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- POEM 3 -->
<div class="section" id="p3">
<div class="box">
<div id="t3"></div>
<h3>are you still with me?</h3>
<button onclick="final()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- FINAL -->
<div class="section" id="final">
<div class="box">
<h2 id="finalText"></h2>
</div>
</div>

<script>

let current="q1";

function go(id){
document.getElementById(current).classList.remove("active");
setTimeout(()=>{
document.getElementById(id).classList.add("active");
current=id;
},400);
}

function start(){
go("p1");
type(t1,p1,28);
}

/* SONGS REMOVED HERE (unchanged earlier logic assumed) */

/* RUNNING NO BUTTON */
function runAway(btn){
btn.classList.add("legs");

let x=Math.random()*300-150;
let y=Math.random()*200-100;

btn.style.position="relative";
btn.style.transform=`translate(${x}px,${y}px) rotate(${x}deg)`;
}

/* POEM SPLIT */
const p1=`I need to tell you something
not to change anything
just because I’m tired of pretending
I told you I moved on
I didn’t
it’s been eleven months
of carrying this quietly
of smiling like it faded
when it never did
I stayed
as your friend`;

const p2=`and I learned how to hide it
how to act okay
but I wasn’t
I’m still here
still feeling it
still hoping quietly
and I hate that I lied to you`;

const p3=`how I still get excited over you
how I still look for you
how everything reminds me of you
how I never really stopped

so if nothing ever changes
I’ll stay
I’ll still be here
as your friend....
though i want you to think about it for a second time`;

/* TYPEWRITER */
function type(el,text,speed,cb){
let i=0;
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i]==="\n"?"<br>":text[i];
i++;
setTimeout(t,speed);
} else cb&&cb();
}
t();
}

/* FLOW */
function goP2(){
go("p2");
type(t2,p2,28);
}
function goP3(){
go("p3");
type(t3,p3,28);
}
function final(){
go("final");
type(document.getElementById("finalText"),
"thank you for your time?",35);

/* blinking ? every 0.5s */
setInterval(()=>{
let el=document.getElementById("finalText");
if(el.innerHTML.includes("?")){
el.innerHTML="thank you for your time";
} else {
el.innerHTML="thank you for your time?";
}
},500);
}

</script>

</body>
</html>
