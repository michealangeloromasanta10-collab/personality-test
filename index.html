<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* paper texture */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}

@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* floating */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* cinematic transitions */
.section{
    display:none;
    padding:40px;
    text-align:center;
    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
}

.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

.section.exit{
    transform:scale(0.92);
    opacity:0;
    filter:blur(12px);
}

/* box */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    max-width:800px;
    margin:auto;
}

/* buttons */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
}
button:hover{background:#a83232;}

/* poem formatting */
#poem{
    white-space:pre-line;
    text-align:left;
    font-size:22px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- QUESTIONS -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>
<button onclick="start()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- SONGS -->
<div class="section" id="songs">
<div class="box">
<h2>songs that remind me of you</h2>
<div id="songBox"></div>
<button onclick="nextSong()">next</button>
</div>
</div>

<!-- POEM -->
<div class="section" id="poemSec">
<div class="box">
<div id="poem"></div>
</div>
</div>

<script>

let current="q1";

/* navigation */
function go(id){
let prev=document.getElementById(current);
prev.classList.add("exit");

setTimeout(()=>{
prev.classList.remove("active","exit");
document.getElementById(id).classList.add("active");
current=id;
},700);
}

function start(){
go("songs");
}

/* songs */
const songs=[
"ALEXANDRA — Reality Club",
"SECRET DOOR — Arctic Monkeys",
"1&ONLY — XLOV"
];
let i=0;

function nextSong(){
if(i<songs.length){
let d=document.createElement("div");
d.innerText=songs[i];
d.style.margin="15px";
document.getElementById("songBox").appendChild(d);
i++;
} else {
document.querySelector("#songs button").onclick=typePoem;
}
}

/* FULL POEM (EXACT) */
const poem = `I need to tell you something
not to change anything
just because I’m tired of pretending
I told you I moved on
I didn’t
it’s been eleven months (or more because I wrote this at Apr 28 2026)
of carrying this quietly
of smiling like it faded
when it never did
I remember when I told you before
and you said you couldn’t
not because there was nothing
but because you were closed
because you thought it wouldn’t end well
and I understood that
I still do
but understanding it
didn’t make my feelings disappear
so I stayed
as your friend
your best friend (I hope 🫣)

and somewhere along the way
I learned how to hide it
how to make it look like I was okay
but I wasn’t
I’m still here
still feeling it
still hoping in ways I don’t say out loud
and I hate that I lied to you about that
because everything I do for you
every little thing
it all comes from something
I never really let go of

and I don’t think you realize
what you do to me
how something as simple as your name
lighting up my phone
can change my whole mood
how I still get excited
over the smallest message from you
how I hear your voice in class
and everything else fades
just for a second
how I look for you
in every crowded place
and somehow
you’re always the one I find first
how I notice everything
the way you talk
the way you laugh
what you’re wearing
how your hair falls
how I catch myself staring
longer than I should
and then pretending I wasn’t

how I make up little scenarios
of us in my head
like holding your hand
like being something more
how every calm moment
every beautiful place
makes me wish
you were there with me
how every love song
sounds like it was written
with you in mind

and it’s exhausting
to feel this much
and act like it’s nothing
to replay conversations
looking for something
that might not even be there
to hope
even when I tell myself
I shouldn’t

and sometimes
I look at you
and I feel like I don’t deserve you
like you’re too good
too smart
too put together
Because you are
and I’m just here
trying to be better
because of you
for you
even if you never see it

and that’s why this is so hard
because I don’t want to lose you
what we have right now
means everything to me
you’re comfortable with me
you trust me
you see me as someone safe (I hope 🥰)
and I don’t want to be the reason
that changes
I don’t want you to pull away
because you notice
what I’m trying so hard to hide

so if nothing ever changes
I’ll stay
I’ll still be here
as your friend....
though i want you to think about it for a second time`;

/* TYPEWRITER SLOW */
function typeText(text, el, speed=35){
let i=0;
el.innerHTML="";

function t(){
if(i<text.length){
el.innerHTML += text[i] === "\n" ? "<br>" : text[i];

/* pause effect */
if(text.substring(i-11,i)==="friendship"){
setTimeout(t,2000); // 2 sec pause
return;
}

i++;
setTimeout(t,speed);
} else {
document.getElementById("poemSec").insertAdjacentHTML(
"beforeend",
`<div style="text-align:center;margin-top:20px">
<button onclick="closeSite()">finish</button>
</div>`
);
}
}
t();
}

function typePoem(){
go("poemSec");
typeText(poem,document.getElementById("poem"));
}

function closeSite(){
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:20%'>closed.</h1>";
}

</script>

</body>
</html>
