<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* PAPER TEXTURE */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}
@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* FLOATING */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* SECTIONS */
.section{
    display:none;
    padding:40px;
    text-align:center;
    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition:1s cubic-bezier(0.22,1,0.36,1);
}
.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

/* BOX */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    max-width:800px;
    margin:auto;
    transition:0.4s;
}

/* ✨ POEM BORDER GLOW */
.glow{
    animation:poemGlow 2s infinite alternate;
}
@keyframes poemGlow{
    from{box-shadow:0 0 10px rgba(255,120,120,0.2);}
    to{box-shadow:0 0 25px rgba(255,120,120,0.6);}
}

/* SONG GLOW */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:15px;
    margin:15px auto;
    width:260px;
    background:rgba(40,10,10,0.6);
    animation:songGlow 1.5s ease;
}
@keyframes songGlow{
    from{box-shadow:0 0 0 rgba(255,100,100,0);}
    to{box-shadow:0 0 20px rgba(255,100,100,0.4);}
}

/* BUTTONS */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
    position:relative;
    overflow:hidden;
}

/* 💡 CLICK LIGHT EFFECT */
button:active::after{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(255,255,255,0.4),transparent);
    transform:translate(-50%,-50%);
    animation:flash 0.4s ease;
}
@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

/* TEXT ANIMATIONS */
.fadeText{
    animation:fadeIn 1.5s ease;
}
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- Q1 -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- Q2 -->
<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- Q3 -->
<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>

<h2 id="beforeText" class="fadeText"></h2>

<button onclick="startCinematic()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- SONGS -->
<div class="section" id="songs">
<div class="box">
<h2 id="btwText" class="fadeText"></h2>
<h3>songs that remind me of you</h3>
<div id="songBox"></div>
<button onclick="nextSong()">next</button>
</div>
</div>

<!-- POEM INTRO -->
<div class="section" id="intro">
<div class="box">
<h2 id="okayText"></h2>
</div>
</div>

<!-- POEM -->
<div class="section" id="poemSec">
<div class="box glow">
<div id="poem"></div>
</div>
</div>

<script>

let current="q1";

function go(id){
let prev=document.getElementById(current);
prev.classList.remove("active");
setTimeout(()=>{
document.getElementById(id).classList.add("active");
current=id;
},400);
}

/* Q3 "BUT BEFORE THAT" */
document.getElementById("beforeText").innerText="but before that";

/* animate it */
setInterval(()=>{
document.getElementById("beforeText").style.opacity=
Math.random()>0.5?"1":"0.5";
},600);

/* START */
function startCinematic(){
go("songs");

/* animate before text */
let t=document.getElementById("btwText");
t.innerText="but before that";
setInterval(()=>{
t.style.transform="scale("+(1+Math.random()*0.05)+")";
},500);
}

/* SONGS */
const songs=[
"ALEXANDRA — Reality Club",
"SECRET DOOR — Arctic Monkeys",
"1&ONLY — XLOV"
];

let i=0;

function nextSong(){
if(i<songs.length){
let d=document.createElement("div");
d.className="song";
d.innerText=songs[i];
document.getElementById("songBox").appendChild(d);
i++;
} else {
go("intro");
typeIntro();
}
}

/* "okay here goes" */
function typeIntro(){
let el=document.getElementById("okayText");
let text="okay here goes...";
let i=0;
el.innerHTML="";

function t(){
if(i<text.length){
el.innerHTML+=text[i];
i++;
setTimeout(t,80);
} else {
setTimeout(()=>go("poemSec"),1200);
setTimeout(typePoem,1600);
}
}
t();
}

/* FULL POEM */
const poem=`I need to tell you something
not to change anything
just because I’m tired of pretending
I told you I moved on
I didn’t
it’s been eleven months (or more because I wrote this at Apr 28 2026)
of carrying this quietly
of smiling like it faded
when it never did
I remember when I told you before
and you said you couldn’t
not because there was nothing
but because you were closed
because you thought it wouldn’t end well
and I understood that
I still do
but understanding it
didn’t make my feelings disappear
so I stayed
as your friend
your best friend (I hope 🫣)

and somewhere along the way
I learned how to hide it
how to make it look like I was okay
but I wasn’t
I’m still here
still feeling it
still hoping in ways I don’t say out loud
and I hate that I lied to you about that

and I don’t think you realize
what you do to me
how your name changes my mood
how I still get excited
over your messages
how I look for you everywhere
and always find you first

how I make scenarios of us
how I wish you were there in every moment
how every love song
feels like it belongs to you

and it’s exhausting
to feel this much
and act like it’s nothing

so if nothing ever changes
I’ll stay
I’ll still be here
as your friend....
though i want you to think about it for a second time`;

/* TYPEWRITER */
function typePoem(){
let el=document.getElementById("poem");
let i=0;
el.innerHTML="";
document.querySelector(".box").classList.add("glow");

function t(){
if(i<poem.length){
el.innerHTML+=poem[i]==="\n"?"<br>":poem[i];
i++;
setTimeout(t,35);
} else {
setTimeout(typeFinal,1000);
}
}
t();
}

/* FINAL SLOW */
function typeFinal(){
go("poemSec");

setTimeout(()=>{
document.getElementById("poem").innerHTML+=
"<br><br><span style='font-size:28px'>thank you...</span>";
},2000);
}

function closeSite(){
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:20%'>closed.</h1>";
}

</script>

</body>
</html>
