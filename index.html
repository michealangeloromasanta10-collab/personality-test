<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* 🎞️ PAPER TEXTURE */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}

@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* FLOATING ELEMENTS */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* 🎬 CINEMATIC ZOOM TRANSITION */
.section{
    display:none;
    padding:40px;
    text-align:center;

    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}

.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0px);
}

.section.exit{
    transform:scale(0.9);
    opacity:0;
    filter:blur(12px);
}

/* BOX STYLE */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    box-shadow:0 0 25px rgba(255,100,100,0.15);
    max-width:800px;
    margin:auto;
}

/* BUTTONS */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
    transition:0.3s;
}
button:hover{background:#a83232;}

/* SONG */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:20px;
    margin:20px auto;
    width:260px;
    background:rgba(40,10,10,0.6);
    animation:fadeIn 1s ease;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- FLOATING -->
<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- QUESTIONS -->
<div class="section active" id="q1">
    <div class="box">
        <h1>are you sure you want to continue?</h1>
        <button onclick="go('q2')">yes</button>
        <button onclick="closeSite()">no</button>
    </div>
</div>

<div class="section" id="q2">
    <div class="box">
        <h1>sure na dyan? mahaba to</h1>
        <button onclick="go('q3')">yes</button>
        <button onclick="closeSite()">no</button>
    </div>
</div>

<div class="section" id="q3">
    <div class="box">
        <h1>last na, are. you. sure?</h1>
        <button onclick="start()">yes</button>
        <button onclick="closeSite()">no</button>
    </div>
</div>

<!-- ANIMATION -->
<div class="section" id="anim">
    <h1 class="box">okay here goes....</h1>
</div>

<!-- SONGS -->
<div class="section" id="songs">
    <div class="box">
        <h2>but before that</h2>
        <h3>songs that remind me of you</h3>

        <div id="songBox"></div>
        <button onclick="nextSong()">next</button>
    </div>
</div>

<!-- POEM -->
<div class="section" id="p1"><div class="box"><div id="t1"></div><button onclick="goP2()">continue</button></div></div>
<div class="section" id="p2"><div class="box"><div id="t2"></div><button onclick="goP3()">continue</button></div></div>
<div class="section" id="p3"><div class="box"><div id="t3"></div><button onclick="final()">continue</button></div></div>

<!-- FINAL -->
<div class="section" id="final">
<div class="box">
<h2 id="finalText"></h2>
</div>
</div>

<script>

let current = "q1";

/* CINEMATIC SWITCH */
function go(id){
    let prev = document.getElementById(current);
    prev.classList.add("exit");

    setTimeout(()=>{
        prev.classList.remove("active","exit");
        document.getElementById(id).classList.add("active");
        current = id;
    },600);
}

/* START FLOW */
function start(){
    go("anim");
    setTimeout(()=>go("songs"),2000);
}

/* SONGS */
const songs = [
"ALEXANDRA — Reality Club",
"SECRET DOOR — Arctic Monkeys",
"1&ONLY — XLOV"
];

let i = 0;
function nextSong(){
    if(i < songs.length){
        let d=document.createElement("div");
        d.className="song";
        d.innerText=songs[i];
        document.getElementById("songBox").appendChild(d);
        i++;
    } else {
        document.querySelector("#songs button").onclick = type1;
    }
}

/* TYPEWRITER */
function type(el,text,speed=18,cb){
    let i=0;
    el.innerHTML="";
    function t(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(t,speed);
        } else cb && cb();
    }
    t();
}

/* POEM */
const p1=`Hii Nyela,
I need to tell you something
not to change anything
just because I’m tired of pretending
I told you I moved on
I didn’t
it’s been eleven months
of carrying this quietly
of smiling like it faded
when it never did
I stayed
as your friend
your best friend (I hope 🫣)`;

const p2=`and I learned how to hide it
how to act okay
but I wasn’t
I’m still here
still feeling it
still hoping quietly`;

const p3=`how I still get excited
how I still look for you
how everything reminds me of you
how I never really stopped`;

function type1(){
    go("p1");
    type(document.getElementById("t1"),p1);
}
function goP2(){
    go("p2");
    type(document.getElementById("t2"),p2);
}
function goP3(){
    go("p3");
    type(document.getElementById("t3"),p3);
}

/* FINAL */
function final(){
    go("final");
    type(document.getElementById("finalText"),
    "I value our friendship.... though i want you to think about it for a second time");
}

/* CLOSE */
function closeSite(){
    document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:20%'>closed.</h1>";
}

</script>

</body>
</html>
