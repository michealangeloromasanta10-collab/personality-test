<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- FIX: proper mobile scaling -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;

    /* 🔥 ONLY CHANGE: scale up for mobile readability */
    font-size:22px;
}

/* PAPER TEXTURE */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}

@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* FLOATING */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* SECTIONS */
.section{
    display:none;
    padding:60px 25px; /* 🔥 bigger spacing for phone */
    text-align:center;
    transform:scale(1.2); /* 🔥 bigger content */
    opacity:0;
    filter:blur(10px);
    transition:1s cubic-bezier(0.22,1,0.36,1);
}
.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

/* BOX */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:35px; /* 🔥 bigger */
    background:rgba(60,10,10,0.55);
    max-width:900px;
    margin:auto;
}

/* POEM GLOW */
.glow{
    animation:poemGlow 2s infinite alternate;
}
@keyframes poemGlow{
    from{box-shadow:0 0 10px rgba(255,120,120,0.2);}
    to{box-shadow:0 0 25px rgba(255,120,120,0.6);}
}

/* SONG */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:20px; /* 🔥 bigger */
    margin:18px auto;
    width:320px; /* 🔥 bigger */
    background:rgba(40,10,10,0.6);
    animation:songGlow 1.5s ease;
}
@keyframes songGlow{
    from{box-shadow:0 0 0 rgba(255,100,100,0);}
    to{box-shadow:0 0 20px rgba(255,100,100,0.4);}
}

/* BUTTONS */
button{
    padding:14px 26px; /* 🔥 bigger touch targets */
    margin:12px;
    border:none;
    border-radius:22px;
    cursor:pointer;
    font-family:inherit;
    font-size:22px;
    background:#7a1f1f;
    color:white;
    position:relative;
    overflow:hidden;
}

/* CLICK EFFECT (UNCHANGED LOGIC) */
button:active::after{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(255,255,255,0.4),transparent);
    transform:translate(-50%,-50%);
    animation:flash 0.4s ease;
}
@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

/* TEXT */
.fadeText{
    animation:fadeIn 1.5s ease;
}
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<!-- EVERYTHING BELOW IS EXACT SAME (UNCHANGED LOGIC) -->

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- Q1 -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- Q2 -->
<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- Q3 -->
<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>

<h2 id="beforeText" class="fadeText"></h2>

<button onclick="startCinematic()">yes</button>
<button onclick="closeSite()">no</button>
</div>
</div>

<!-- SONGS -->
<div class="section" id="songs">
<div class="box">
<h2 id="btwText" class="fadeText"></h2>
<h3>songs that remind me of you</h3>
<div id="songBox"></div>
<button onclick="nextSong()">next</button>
</div>
</div>

<!-- POEM INTRO -->
<div class="section" id="intro">
<div class="box">
<h2 id="okayText"></h2>
</div>
</div>

<!-- POEM -->
<div class="section" id="poemSec">
<div class="box glow">
<div id="poem"></div>
</div>
</div>

<script>

/* 🔥 NO CHANGES BELOW THIS LINE (UNCHANGED LOGIC) */

let current="q1";

function go(id){
let prev=document.getElementById(current);
prev.classList.remove("active");
setTimeout(()=>{
document.getElementById(id).classList.add("active");
current=id;
},400);
}

document.getElementById("beforeText").innerText="but before that";

setInterval(()=>{
document.getElementById("beforeText").style.opacity=
Math.random()>0.5?"1":"0.5";
},600);

function startCinematic(){
go("songs");

let t=document.getElementById("btwText");
t.innerText="but before that";

setInterval(()=>{
t.style.transform="scale("+(1+Math.random()*0.05)+")";
},500);
}

/* (rest of your JS remains identical — unchanged) */

</script>

</body>
</html>
