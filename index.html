<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confession</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

body{
    margin:0;
    font-family:'Caveat', cursive;
    background:#2b0a0a;
    color:#f5d6d6;
    overflow-x:hidden;
}

/* texture */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:url('https://www.transparenttextures.com/patterns/old-mathematics.png');
    opacity:0.08;
    animation:grain 8s steps(10) infinite;
    pointer-events:none;
}
@keyframes grain{
    0%{transform:translate(0,0);}
    50%{transform:translate(-5%,5%);}
    100%{transform:translate(0,0);}
}

/* float */
.heart,.star,.cat{
    position:fixed;
    animation:float 12s linear infinite;
    opacity:0.25;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* sections */
.section{
    display:none;
    padding:40px;
    text-align:center;
    transform:scale(1.15);
    opacity:0;
    filter:blur(10px);
    transition:1s cubic-bezier(0.22,1,0.36,1);
}
.section.active{
    display:block;
    transform:scale(1);
    opacity:1;
    filter:blur(0);
}

/* box */
.box{
    border:2px solid #b85c5c;
    border-radius:15px;
    padding:25px;
    background:rgba(60,10,10,0.55);
    max-width:800px;
    margin:auto;
}

/* ✨ SONG RESTORED + GLOW */
.song{
    border:2px solid #b85c5c;
    border-radius:12px;
    padding:15px;
    margin:15px auto;
    width:260px;
    background:rgba(40,10,10,0.6);
    animation:songGlow 1s ease;
}
@keyframes songGlow{
    from{
        box-shadow:0 0 0 rgba(255,100,100,0);
        transform:scale(0.95);
        opacity:0;
    }
    to{
        box-shadow:0 0 20px rgba(255,100,100,0.4);
        transform:scale(1);
        opacity:1;
    }
}

/* buttons */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-family:inherit;
    font-size:20px;
    background:#7a1f1f;
    color:white;
}

/* running no */
.no-run{
    transition:0.2s;
    position:relative;
}
.no-run.legs{
    animation:run 0.6s infinite;
}
@keyframes run{
    0%{transform:translate(0,0) rotate(0);}
    50%{transform:translate(30px,-20px) rotate(15deg);}
    100%{transform:translate(-30px,20px) rotate(-15deg);}
}

/* blinking question mark */
.blink{
    animation:blink 0.5s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="heart">♥</div>
<div class="star">★</div>
<div class="cat">🐱</div>

<!-- Q1 -->
<div class="section active" id="q1">
<div class="box">
<h1>are you sure you want to continue?</h1>
<button onclick="go('q2')">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- Q2 -->
<div class="section" id="q2">
<div class="box">
<h1>sure na dyan? mahaba to</h1>
<button onclick="go('q3')">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- Q3 -->
<div class="section" id="q3">
<div class="box">
<h1>last na, are. you. sure?</h1>
<h2 class="blink">but before that</h2>
<button onclick="startSongs()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<!-- SONGS (RESTORED) -->
<div class="section" id="songs">
<div class="box">
<h2>songs that remind me of you</h2>
<div id="songBox"></div>
<button onclick="nextSong()">next</button>
</div>
</div>

<!-- POEM -->
<div class="section" id="p1">
<div class="box">
<div id="t1"></div>
<h3>are you still with me?</h3>
<button onclick="goP2()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<div class="section" id="p2">
<div class="box">
<div id="t2"></div>
<h3>are you still with me?</h3>
<button onclick="goP3()">yes</button>
<button class="no-run" onmouseover="runAway(this)" onclick="runAway(this)">no</button>
</div>
</div>

<div class="section" id="p3">
<div class="box">
<div id="t3"></div>
</div>
</div>

<!-- FINAL -->
<div class="section" id="final">
<div class="box">
<h2 id="finalText"></h2>
</div>
</div>

<script>

let current="q1";

function go(id){
document.getElementById(current).classList.remove("active");
setTimeout(()=>{
document.getElementById(id).classList.add("active");
current=id;
},400);
}

/* SONG FLOW */
const songs=[
"ALEXANDRA — Reality Club",
"SECRET DOOR — Arctic Monkeys",
"1&ONLY — XLOV"
];

let i=0;

function startSongs(){
go("songs");
}

function nextSong(){
if(i<songs.length){
let d=document.createElement("div");
d.className="song";
d.innerText=songs[i];
document.getElementById("songBox").appendChild(d);
i++;
} else {
go("p1");
type(document.getElementById("t1"),p1,28);
}
}

/* RUN AWAY NO BUTTON */
function runAway(btn){
btn.classList.add("legs");

let x=Math.random()*400-200;
let y=Math.random()*300-150;

btn.style.transform=`translate(${x}px,${y}px) rotate(${x}deg)`;
}

/* POEM */
const p1=`I need to tell you something
not to change anything
just because I’m tired of pretending
I stayed as your friend
your best friend (I hope 🫣)`;

const p2=`I learned how to hide it
but I never stopped feeling it
I still look for you
in everything`;

const p3=`and I never really moved on
so if nothing changes
I’ll stay
as your friend....
though i want you to think about it for a second time`;

/* TYPE */
function type(el,text,speed,cb){
let i=0;
el.innerHTML="";
function t(){
if(i<text.length){
el.innerHTML+=text[i]==="\n"?"<br>":text[i];
i++;
setTimeout(t,speed);
} else cb&&cb();
}
t();
}

function goP2(){
go("p2");
type(document.getElementById("t2"),p2,28);
}
function goP3(){
go("p3");
type(document.getElementById("t3"),p3,28,final);
}

/* FINAL */
function final(){
go("final");

type(document.getElementById("finalText"),
"thank you for your time?",35);

/* blink ? every 0.5s */
setInterval(()=>{
let el=document.getElementById("finalText");
if(el.innerHTML.includes("?")){
el.innerHTML="thank you for your time";
} else {
el.innerHTML="thank you for your time?";
}
},500);
}

</script>

</body>
</html>
